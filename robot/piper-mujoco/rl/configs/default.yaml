env:
  n_substeps: 5          # MuJoCo substeps per RL step
  max_episode_steps: 500 # steps before truncation

agent:
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  n_steps: 512           # rollout length before each update
  entropy_coef: 0.01
  value_coef: 0.5
  max_grad_norm: 0.5
  hidden_dim: 256

train:
  total_steps: 2000000
  log_interval: 10       # log every N updates
  save_interval: 100     # save checkpoint every N updates
