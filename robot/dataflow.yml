nodes:
  - id: robot_controller
    path: controller/controller_node.py
    inputs:
      tick: dora/timer/millis/4
      command: joystick/command

  - id: joystick
    path: ../extra/joystick.py
    inputs:
      tick: dora/timer/millis/20
    outputs:
      - command

  - id: iphone
    path: sensor/iphone.py
    inputs:
      tick: dora/timer/millis/20
    outputs:
      - image
      - depth
      - pose
      - confidence

  - id: rerun
    path: rerun/viz_publisher.py
    inputs:
      tick: dora/timer/millis/1000
      iphone/image: iphone/image
      iphone/depth: iphone/depth
      iphone/pose: iphone/pose
      iphone/confidence: iphone/confidence

