nodes:
  - id: arm_mujoco
    custom:
      source: arm/arm_mujoco_node.py
      inputs:
        tick: dora/timer/millis/5
        arm_command: teleop/arm_command
      outputs:
        - ee_pose

  - id: teleop
    custom:
      source: teleop/oculus_open_teach_node.py
      inputs:
        tick: dora/timer/millis/16 # 60 Hz
        ee_pose: arm_mujoco/ee_pose
      outputs:
        - arm_command