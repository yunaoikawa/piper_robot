nodes:
  - id: iphone
    path: sensor/iphone.py
    inputs:
      tick: dora/timer/millis/20
    outputs:
      - image
      - depth
      - pose
      - confidence

  - id: iphone_listener
    path: sensor/iphone_listener.py
    inputs:
      image: iphone/image
      depth: iphone/depth
      pose: iphone/pose
      confidence: iphone/confidence